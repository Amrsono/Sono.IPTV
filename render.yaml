services:
  - type: web
    name: sono-iptv-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false   # Set this in the Render dashboard
    autoDeploy: true
